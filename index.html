<!DOCTYPE html>
<html>
<head>
  <title>LEVZA Employee Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <style>
    body {
      background-image: linear-gradient(135deg, rgba(11, 31, 58, 0.7), rgba(20, 47, 85, 0.7)), url('https://i.postimg.cc/4yfdVF95/Chat-GPT-Image-Apr-5-2026-04-46-20-PM.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      min-height: 100vh;
      position: relative;
    }
    .logo-container { position: absolute; top: 25px; left: 30px; }
    .logo { width: 250px; }
    .page-container { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; min-height: 100vh; padding: 100px 20px 40px 20px; }
    .form-header-text { text-align: center; margin-bottom: 25px; width: 100%; }
    .form-title { font-weight: 600; color: #ffffff; font-size: 2.2rem; }
    .form-title span { color: #ff9900; }
    .form-subtitle { font-size: 0.95rem; color: #ccc; }
    .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border-radius: 18px; padding: 2.5rem; border: 1px solid rgba(255, 255, 255, 0.15); border-top: 1px solid rgba(255, 255, 255, 0.3); border-left: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4); max-width: 900px; width: 100%; }
    .section-title { font-weight: 600; margin-top: 1.5rem; margin-bottom: 1.5rem; color: #fff; display: flex; align-items: center; gap: 10px; }
    .section-title i { color: #ff9900; }
    .form-control, .form-select { background-color: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; border-radius: 10px; height: 48px; padding-left: 15px; transition: all 0.3s; }
    .form-control::placeholder { color: #bbb; opacity: 1; }
    .form-control:focus, .form-select:focus { background-color: rgba(255, 255, 255, 0.15); border-color: #ff9900; box-shadow: 0 0 10px rgba(255, 153, 0, 0.4); color: #fff; }
    .form-select { cursor: pointer; }
    .form-select option { background: #0b1f3a; }
    .form-select:disabled { background-color: rgba(255, 255, 255, 0.03); cursor: not-allowed; color: #777;}
    .btn-submit { background: linear-gradient(135deg, #ff9900, #ff7a00); border: none; border-radius: 12px; height: 52px; font-weight: 600; color: #fff; transition: all 0.3s; font-size: 1.1rem; margin-top: 2rem; }
    .btn-submit:hover { box-shadow: 0 5px 15px rgba(255, 153, 0, 0.5); transform: translateY(-2px); }
    .form-check-label { font-size: 0.95rem; color: #ffffff; }
    .confidential { text-align: center; font-size: 0.8rem; color: #ccc; margin-top: 1rem; }
    #successBox { position: fixed; top: 20px; right: 20px; background: rgba(11, 31, 58, 0.9); backdrop-filter: blur(10px); color: white; padding: 15px 25px; border-radius: 10px; opacity: 0; transition: opacity 0.4s; z-index: 9999; border: 1px solid #ff9900; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    #successBox.show { opacity: 1; }
    .flatpickr-calendar { background: #0b1f3a; border-radius: 8px; border: 1px solid #ff9900; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    .flatpickr-months .flatpickr-month, .flatpickr-current-month .flatpickr-monthDropdown-months, .flatpickr-current-month input.cur-year, .flatpickr-weekday, .flatpickr-day { color: #fff; }
    .flatpickr-current-month input.cur-year { background: transparent; }
    .flatpickr-day:hover, .flatpickr-day:focus { background: rgba(255, 153, 0, 0.3); border-color: transparent; }
    .flatpickr-day.selected, .flatpickr-day.startRange, .flatpickr-day.endRange { background: #ff9900; border-color: #ff9900; }
    .flatpickr-time { background: #0b1f3a; border-top: 1px solid #ff9900; }
    .flatpickr-time .numInput, .flatpickr-time .numInputWrapper { color: #fff; }
    .flatpickr-months .flatpickr-prev-month svg, .flatpickr-months .flatpickr-next-month svg { fill: #fff; }
  </style>
</head>
<body>

  <div class="logo-container">
      <img src="https://i.postimg.cc/MKh5pB49/Gemini-Generated-Image-f1z1rjf1z1rjf1z1-removebg-preview.png" class="logo" alt="LEVZA Logo">
  </div>

  <div class="page-container">
    <div class="form-header-text">
        <h2 class="form-title">Employee <span>Application Form</span></h2>
        <p class="form-subtitle">We're excited to learn more about you. Please fill in your details below.</p>
    </div>

    <div class="card">
      <form id="form">
        <h5 class="section-title" style="margin-top: 0;"><i class="fas fa-user"></i>Personal Information</h5>
        <div class="row g-3">
          <div class="col-md-6"><input type="text" id="firstName" name="FirstName" class="form-control" placeholder="First Name" required></div>
          <div class="col-md-6"><input type="text" id="lastName" name="LastName" class="form-control" placeholder="Last Name" required></div>
          <div class="col-md-4"><input type="text" id="cnic" name="CNIC" class="form-control" placeholder="CNIC Number (xxxxx-xxxxxxx-x)" required></div>
          <div class="col-md-4"><input type="text" id="dob" name="DOB" class="form-control" placeholder="Date of Birth" required></div>
          <div class="col-md-4">
              <select id="gender" name="Gender" class="form-select" required>
                  <option value="" selected disabled>Select Gender</option>
                  <option>Male</option>
                  <option>Female</option>
                  <option>Other</option>
              </select>
          </div>
          <div class="col-md-6"><input type="tel" id="contactNumber" name="Contact" class="form-control" placeholder="Contact Number (03xx-xxxxxxx)" required></div>
          <div class="col-md-6"><input type="email" id="email" name="Email" class="form-control" placeholder="Email Address" required></div>
        </div>

        <h5 class="section-title"><i class="fas fa-map-marker-alt"></i>Address</h5>
        <div class="row g-3">
           <div class="col-md-12">
               <select id="country" name="Country" class="form-select" required>
                   <option value="" selected disabled>Select Country</option>
               </select>
           </div>
          <div class="col-md-4" id="stateDiv">
              <select id="state" name="State" class="form-select" required disabled>
                  <option value="" selected disabled>Select State / Province</option>
              </select>
          </div>
          <div class="col-md-4" id="cityDiv">
              <select id="city" name="City" class="form-select" required disabled>
                  <option value="" selected disabled>Select City</option>
              </select>
          </div>
          <div class="col-md-4"><input type="text" id="postal" name="Postal" class="form-control" placeholder="Postal Code" required></div>
          <div class="col-md-12"><input type="text" id="address" name="Address" class="form-control" placeholder="Street Address (House no., street, area)" required></div>
        </div>

        <h5 class="section-title"><i class="fas fa-briefcase"></i>Employee Details</h5>
        <div class="row g-3">
            <div class="col-md-6">
                <select id="position" name="Position" class="form-select" required>
                    <option value="" selected disabled>Position Applied For</option>
                    <option>Account Provider PK</option>
                    <option>Account Provider UK</option>
                    <option>Manager</option>
                    <option>Developer</option>
                </select>
            </div>
            <div class="col-md-6">
                <select id="investor" name="Investor" class="form-select" required>
                    <option value="" selected disabled>Are you an investor?</option>
                    <option>No</option>
                    <option>Yes</option>
                </select>
            </div>
            <div class="col-md-6">
                <input type="text" id="joiningDate" name="JoiningDate" class="form-control" placeholder="Available joining date" required>
            </div>
             <div class="col-md-6" id="amountDiv" style="display:none">
                <input type="number" id="amount" name="InvestmentAmount" class="form-control" placeholder="Investment Amount">
            </div>
            <div class="col-md-12">
                <textarea id="greatFit" name="GreatFit" class="form-control" rows="3" placeholder="Tell us why you're a great fit for Levza..." required></textarea>
            </div>
        </div>
        
        <div class="form-check mt-4 d-flex align-items-center">
          <input class="form-check-input me-2" type="checkbox" id="declaration" required style="cursor: pointer; width: 1.2rem; height: 1.2rem;">
          <label class="form-check-label" for="declaration" style="cursor: pointer;">
            I have filled all the sections.
          </label>
        </div>
        
        <button id="submitBtn" class="btn-submit w-100" type="submit"><i class="fas fa-paper-plane"></i> Submit Application</button>
        <p class="confidential"><i class="fas fa-lock"></i> Your information is secure and will be kept confidential.</p>
      </form>
    </div>
  </div>
  
  <div id="successBox">
    Form submitted successfully ✅
  </div>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script>
    const locationData = {
        "Pakistan": { "Punjab": ["Lahore", "Faisalabad", "Rawalpindi", "Multan", "Gujranwala"], "Sindh": ["Karachi", "Hyderabad", "Sukkur", "Larkana"], "KPK": ["Peshawar", "Abbottabad", "Mardan", "Swat"], "Balochistan": ["Quetta", "Gwadar", "Khuzdar"], "Islamabad": ["Islamabad City"] },
        "United Kingdom": { "England": ["London", "Manchester", "Birmingham", "Leeds", "Liverpool"], "Scotland": ["Edinburgh", "Glasgow", "Aberdeen"], "Wales": ["Cardiff", "Swansea", "Newport"], "Northern Ireland": ["Belfast", "Derry"] },
        "United States": { "California": ["Los Angeles", "San Francisco", "San Diego"], "New York": ["New York City", "Buffalo", "Rochester"], "Texas": ["Houston", "Austin", "Dallas"] },
        "United Arab Emirates": { "Dubai": ["Dubai City"], "Abu Dhabi": ["Abu Dhabi City", "Al Ain"], "Sharjah": ["Sharjah City"] },
        "Canada": { "Ontario": ["Toronto", "Ottawa", "Mississauga"], "British Columbia": ["Vancouver", "Victoria"], "Quebec": ["Montreal", "Quebec City"] },
        "Australia": { "New South Wales": ["Sydney", "Newcastle"], "Victoria": ["Melbourne", "Geelong"], "Queensland": ["Brisbane", "Gold Coast"] }
    };

    const allCountriesList = [ "Afghanistan","Albania","Algeria","Andorra","Angola","Antigua and Barbuda","Argentina","Armenia","Australia","Austria","Azerbaijan","Bahamas","Bahrain","Bangladesh","Barbados","Belarus","Belgium","Belize","Benin","Bhutan","Bolivia","Bosnia and Herzegovina","Botswana","Brazil","Brunei","Bulgaria","Burkina Faso","Burundi","Cabo Verde","Cambodia","Cameroon","Canada","Central African Republic","Chad","Chile","China","Colombia","Comoros","Congo","Costa Rica","Croatia","Cuba","Cyprus","Czechia","Denmark","Djibouti","Dominica","Dominican Republic","Ecuador","Egypt","El Salvador","Equatorial Guinea","Eritrea","Estonia","Eswatini","Ethiopia","Fiji","Finland","France","Gabon","Gambia","Georgia","Germany","Ghana","Greece","Grenada","Guatemala","Guinea","Guinea-Bissau","Guyana","Haiti","Honduras","Hungary","Iceland","India","Indonesia","Iran","Iraq","Ireland","Israel","Italy","Jamaica","Japan","Jordan","Kazakhstan","Kenya","Kiribati","Korea (North)","Korea (South)","Kuwait","Kyrgyzstan","Laos","Latvia","Lebanon","Lesotho","Liberia","Libya","Liechtenstein","Lithuania","Luxembourg","Madagascar","Malawi","Malaysia","Maldives","Mali","Malta","Marshall Islands","Mauritania","Mauritius","Mexico","Micronesia","Moldova","Monaco","Mongolia","Montenegro","Morocco","Mozambique","Myanmar","Namibia","Nauru","Nepal","Netherlands","New Zealand","Nicaragua","Niger","Nigeria","North Macedonia","Norway","Oman","Pakistan","Palau","Palestine","Panama","Papua New Guinea","Paraguay","Peru","Philippines","Poland","Portugal","Qatar","Romania","Russia","Rwanda","Saint Kitts and Nevis","Saint Lucia","Saint Vincent","Samoa","San Marino","Sao Tome and Principe","Saudi Arabia","Senegal","Serbia","Seychelles","Sierra Leone","Singapore","Slovakia","Slovenia","Solomon Islands","Somalia","South Africa","South Sudan","Spain","Sri Lanka","Sudan","Suriname","Sweden","Switzerland","Syria","Taiwan","Tajikistan","Tanzania","Thailand","Timor-Leste","Togo","Tonga","Trinidad and Tobago","Tunisia","Turkey","Turkmenistan","Tuvalu","Uganda","Ukraine","United Arab Emirates","United Kingdom","United States","Uruguay","Uzbekistan","Vanuatu","Vatican City","Venezuela","Vietnam","Yemen","Zambia","Zimbabwe" ];

    const countrySelect = document.getElementById('country');
    allCountriesList.forEach(country => {
        let option = document.createElement("option"); option.value = country; option.text = country; countrySelect.add(option);
    });

    countrySelect.addEventListener('change', function() {
        const stateDiv = document.getElementById('stateDiv'); const cityDiv = document.getElementById('cityDiv');
        if (locationData[this.value]) {
            stateDiv.innerHTML = '<select id="state" name="State" class="form-select" required><option value="" selected disabled>Select State / Province</option></select>';
            cityDiv.innerHTML = '<select id="city" name="City" class="form-select" required disabled><option value="" selected disabled>Select City</option></select>';
            const stateSelect = document.getElementById('state'); const citySelect = document.getElementById('city');
            for (let state in locationData[this.value]) {
                let option = document.createElement("option"); option.value = state; option.text = state; stateSelect.add(option);
            }
            stateSelect.addEventListener('change', function() {
                citySelect.innerHTML = '<option value="" selected disabled>Select City</option>'; citySelect.disabled = false;
                let cities = locationData[countrySelect.value][this.value];
                cities.forEach(function(city) {
                    let option = document.createElement("option"); option.value = city; option.text = city; citySelect.add(option);
                });
            });
        } else {
            stateDiv.innerHTML = '<input type="text" id="state" name="State" class="form-control" placeholder="Enter State / Province" required>';
            cityDiv.innerHTML = '<input type="text" id="city" name="City" class="form-control" placeholder="Enter City" required>';
        }
    });

    const form = document.getElementById('form');
    const submitBtn = document.getElementById('submitBtn');
    const successBox = document.getElementById('successBox');
    const investorSelect = document.getElementById('investor');
    const amountDiv = document.getElementById('amountDiv');

    // Calendar
    flatpickr("#dob, #joiningDate", { altInput: true, altFormat: "F j, Y", dateFormat: "Y-m-d", disableMobile: true });

    // Amount Toggle
    investorSelect.addEventListener("change", function() {
      amountDiv.style.display = this.value === "Yes" ? "block" : "none";
      if(this.value === "Yes"){ document.getElementById('amount').setAttribute('required', 'required'); } 
      else { document.getElementById('amount').removeAttribute('required'); }
    });

    // ==========================================
    // GOOGLE SHEETS LINK (YAHAN APNA LINK DALEIN)
    // ==========================================
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzs3Sx6WZ7DYPSNA1ENjP2B6Jcp38KCrXtfyrjwoR_EZKqQp8aZnIT-nqLUPPywuqO_/exec'; 

    form.addEventListener("submit", function(e) {
      e.preventDefault();
      
      if (!form.checkValidity()) { form.reportValidity(); return; }
      
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting...';
      submitBtn.disabled = true;

      let formData = new FormData(form);
      if(investorSelect.value !== "Yes") { formData.set("InvestmentAmount", ""); }

      fetch(scriptURL, { method: 'POST', body: formData })
        .then(response => response.json()) 
        .then(data => {
            if (data.result === "success") {
                successBox.classList.add("show");
                submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit Application';
                submitBtn.disabled = false;
                form.reset();
                
                document.querySelectorAll(".flatpickr-input").forEach(input => {
                    if (input._flatpickr) input._flatpickr.clear();
                });
                
                investorSelect.value = "";
                amountDiv.style.display = 'none';
                document.getElementById('stateDiv').innerHTML = '<select id="state" name="State" class="form-select" required disabled><option value="" selected disabled>Select State / Province</option></select>';
                document.getElementById('cityDiv').innerHTML = '<select id="city" name="City" class="form-select" required disabled><option value="" selected disabled>Select City</option></select>';
                
                setTimeout(() => { successBox.classList.remove("show"); }, 4000);
            } else {
                alert("Google Sheet Error: " + JSON.stringify(data.error));
                submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit Application';
                submitBtn.disabled = false;
            }
        })
        .catch(error => {
            alert('CORS ya Network Error! Please try again.');
            submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit Application';
            submitBtn.disabled = false;
        });
    });
  </script>
</body>
</html>

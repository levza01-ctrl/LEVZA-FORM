<!DOCTYPE html>
<html>
<head>
  <title>LEVZA Employee Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <style>
    body { background-image: linear-gradient(135deg, rgba(11, 31, 58, 0.7), rgba(20, 47, 85, 0.7)), url('https://i.postimg.cc/4yfdVF95/Chat-GPT-Image-Apr-5-2026-04-46-20-PM.png'); background-size: cover; background-position: center; background-attachment: fixed; font-family: 'Segoe UI', sans-serif; color: #fff; min-height: 100vh; position: relative; overflow-x: hidden; }
    .logo-container { position: absolute; top: 25px; left: 30px; }
    .logo { width: 250px; }
    .page-container { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; min-height: 100vh; padding: 100px 20px 40px 20px; }
    .form-header-text { text-align: center; margin-bottom: 25px; width: 100%; }
    .form-title { font-weight: 600; color: #ffffff; font-size: 2.2rem; }
    .form-title span { color: #ff9900; }
    .form-subtitle { font-size: 0.95rem; color: #ccc; }
    .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 18px; padding: 2.5rem; border: 1px solid rgba(255, 255, 255, 0.15); border-top: 1px solid rgba(255, 255, 255, 0.3); border-left: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4); max-width: 900px; width: 100%; }
    .section-title { font-weight: 600; margin-top: 1.5rem; margin-bottom: 1.5rem; color: #fff; display: flex; align-items: center; gap: 10px; }
    .section-title i { color: #ff9900; }

    /* ====================================================== */
    /* CLEAN COLOR & GLASSY FIX (ANTI-FREEZE)                 */
    /* ====================================================== */
    .form-control, .form-select { 
        background-color: rgba(255, 255, 255, 0.08) !important; 
        border: 1px solid rgba(255, 255, 255, 0.2) !important; 
        color: #ffffff !important; 
        border-radius: 10px; 
        height: 48px; 
        padding-left: 15px;
    }

    /* Safe Autofill Fix */
    input:-webkit-autofill {
        -webkit-box-shadow: 0 0 0 1000px #132a4a inset !important;
        -webkit-text-fill-color: white !important;
    }

    .form-control:focus, .form-select:focus { 
        background-color: rgba(255, 255, 255, 0.12) !important; 
        border-color: rgba(255, 153, 0, 0.6) !important; 
        box-shadow: 0 0 15px rgba(255, 153, 0, 0.2) !important;
        outline: none !important;
        color: #fff !important;
    }

    .form-control::placeholder { color: #bbb !important; }
    .form-select option { background-color: #0e2746 !important; color: #fff !important; }
    
    .form-control:disabled, .form-select:disabled { background-color: rgba(255, 255, 255, 0.05) !important; color: #ccc !important; }

    /* Buttons */
    .btn-submit { background: linear-gradient(135deg, #ff9900, #ff7a00); border: none; border-radius: 12px; height: 52px; font-weight: 600; color: #fff; transition: all 0.3s; font-size: 1.1rem; margin-top: 2rem; }
    .btn-submit:hover { box-shadow: 0 5px 15px rgba(255, 153, 0, 0.5); transform: translateY(-2px); }
    .btn-code { height: 48px; border-radius: 10px; background-color: rgba(255, 255, 255, 0.1); color: #fff; border: 1px solid rgba(255, 255, 255, 0.2); }
    .btn-success-custom { background-color: #198754 !important; color: white !important; border: none !important; pointer-events: none; }
    .form-check-label { font-size: 0.95rem; color: #ffffff !important; cursor: pointer; }

    /* ========================================= */
    /* VIP MODAL OVERLAYS (ULTRA STABLE)         */
    /* ========================================= */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(4, 15, 33, 0.9); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 10001; padding: 20px; }
    .modal-overlay.active { display: flex; }
    .modal-card { background: #0b1f3a; border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px; padding: 1.5rem; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }

    /* Calendar Modal Specific */
    .flatpickr-calendar { background: transparent !important; border: none !important; box-shadow: none !important; width: 100% !important; }
    .flatpickr-day.selected { background: #ff9900 !important; border-color: #ff9900 !important; }
    .flatpickr-current-month, .cur-year { color: #fff !important; fill: #fff !important; }
    .flatpickr-weekday { color: #ff9900 !important; font-weight: bold !important; }
    .flatpickr-day { color: #fff !important; }
    
    .otp-input-large { background: rgba(0, 0, 0, 0.3) !important; font-size: 1.8rem !important; letter-spacing: 12px; text-align: center; border: 2px solid rgba(255,153,0,0.5) !important; color: #fff !important; height: 65px; border-radius: 12px; }
    .success-icon { font-size: 4rem; color: #198754; margin-bottom: 1rem; }
  </style>
</head>
<body>

  <div class="logo-container">
      <img src="https://i.postimg.cc/MKh5pB49/Gemini-Generated-Image-f1z1rjf1z1rjf1z1-removebg-preview.png" class="logo" alt="LEVZA Logo">
  </div>

  <div class="page-container">
    <div class="form-header-text">
        <h2 class="form-title">Employee <span>Application Form</span></h2>
        <p class="form-subtitle">Join the LEVZA team. Fill in your details below.</p>
    </div>

    <div class="card">
      <form id="form">
        <h5 class="section-title" style="margin-top: 0;"><i class="fas fa-user"></i>Personal Information</h5>
        <div class="row g-3">
          <div class="col-md-6"><input type="text" name="FirstName" class="form-control" placeholder="First Name" required></div>
          <div class="col-md-6"><input type="text" name="LastName" class="form-control" placeholder="Last Name" required></div>
          <div class="col-md-4"><input type="text" name="CNIC" class="form-control" placeholder="CNIC (xxxxx-xxxxxxx-x)" required></div>
          
          <div class="col-md-4">
              <input type="text" id="dobTrigger" class="form-control" placeholder="Date of Birth" readonly required style="cursor: pointer;">
              <input type="hidden" id="dob" name="DOB">
          </div>
          
          <div class="col-md-4">
              <select name="Gender" class="form-select" required>
                  <option value="" selected disabled>Select Gender</option>
                  <option>Male</option>
                  <option>Female</option>
                  <option>Other</option>
              </select>
          </div>
          <div class="col-md-5"><input type="tel" name="Contact" class="form-control" placeholder="Contact Number" required></div>
          <div class="col-md-5"><input type="email" id="email" name="Email" class="form-control" placeholder="Email Address" required></div>
          <div class="col-md-2"><button type="button" id="sendCodeBtn" class="btn btn-code w-100">OTP</button></div>
        </div>

        <h5 class="section-title"><i class="fas fa-map-marker-alt"></i>Address</h5>
        <div class="row g-3">
           <div class="col-md-12">
               <select id="country" name="Country" class="form-select" required>
                   <option value="" selected disabled>Select Country</option>
               </select>
           </div>
          <div class="col-md-4" id="stateDiv"><select id="state" name="State" class="form-select" required disabled><option value="" selected disabled>Select State</option></select></div>
          <div class="col-md-4" id="cityDiv"><select id="city" name="City" class="form-select" required disabled><option value="" selected disabled>Select City</option></select></div>
          <div class="col-md-4"><input type="text" name="Postal" class="form-control" placeholder="Postal Code" required></div>
          <div class="col-md-12"><input type="text" name="Address" class="form-control" placeholder="Street Address" required></div>
        </div>

        <h5 class="section-title"><i class="fas fa-briefcase"></i>Work Details</h5>
        <div class="row g-3">
            <div class="col-md-6">
                <select name="Position" class="form-select" required>
                    <option value="" selected disabled>Position</option>
                    <option>Account Provider PK</option>
                    <option>Account Provider UK</option>
                    <option>Manager</option>
                    <option>Developer</option>
                </select>
            </div>
            <div class="col-md-6">
                <select id="investor" name="Investor" class="form-select" required>
                    <option value="" selected disabled>Are you an investor?</option>
                    <option>No</option>
                    <option>Yes</option>
                </select>
            </div>
            <div class="col-md-6">
                <input type="text" id="joiningDateTrigger" class="form-control" placeholder="Joining Date" readonly required style="cursor: pointer;">
                <input type="hidden" id="joiningDate" name="JoiningDate">
            </div>
            <div class="col-md-6" id="amountDiv" style="display:none"><input type="number" id="amount" name="InvestmentAmount" class="form-control" placeholder="Amount"></div>
            <div class="col-md-12"><textarea name="GreatFit" class="form-control" rows="3" placeholder="Tell us why you're a great fit..." required></textarea></div>
        </div>
        
        <div class="form-check mt-4">
          <input class="form-check-input me-2" type="checkbox" id="declaration" required>
          <label class="form-check-label" for="declaration">I verify my email and details.</label>
        </div>
        
        <button id="submitBtn" class="btn-submit w-100" type="submit"><i class="fas fa-paper-plane"></i> Submit Application</button>
      </form>
    </div>
  </div>

  <div id="dateModalOverlay" class="modal-overlay">
      <div class="modal-card">
          <h5 id="modalTitle" style="color: #ff9900; margin-bottom: 10px;">Select Date</h5>
          <div id="inlineCalendar"></div>
          <button type="button" id="confirmDateBtn" class="btn-submit w-100" style="margin-top: 15px; height: 45px;">Confirm</button>
          <button type="button" onclick="closeDateModal()" style="background:none; border:none; color:#aaa; margin-top:10px; text-decoration:underline;">Cancel</button>
      </div>
  </div>

  <div id="otpModalOverlay" class="modal-overlay">
      <div class="modal-card">
          <h4 style="color:#fff;">Verify Email</h4>
          <p id="modalEmailText" style="color:#ff9900;"></p>
          <input type="text" id="verificationCode" class="form-control otp-input-large" placeholder="------" maxlength="6">
          <small id="otpMessage" class="d-block text-warning mt-2"></small>
          <button type="button" id="verifyCodeBtn" class="btn-submit w-100">Verify Now</button>
      </div>
  </div>

  <div id="thankYouModalOverlay" class="modal-overlay">
      <div class="modal-card">
          <div class="success-icon">✓</div>
          <h3 style="color:#fff;">Success!</h3>
          <p style="color:#ccc;">Your application has been submitted.</p>
          <button type="button" onclick="location.reload()" class="btn-submit w-100">Done</button>
      </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script>
    const locationData = { "Pakistan": { "Punjab": ["Lahore", "Faisalabad"], "Sindh": ["Karachi", "Hyderabad"] }, "United Kingdom": { "England": ["London", "Manchester"] } };
    const allCountries = ["Afghanistan","Albania","Algeria","Andorra","Angola","Antigua and Barbuda","Argentina","Armenia","Australia","Austria","Azerbaijan","Bahamas","Bahrain","Bangladesh","Barbados","Belarus","Belgium","Belize","Benin","Bhutan","Bolivia","Bosnia and Herzegovina","Botswana","Brazil","Brunei","Bulgaria","Burkina Faso","Burundi","Cabo Verde","Cambodia","Cameroon","Canada","Central African Republic","Chad","Chile","China","Colombia","Comoros","Congo","Costa Rica","Croatia","Cuba","Cyprus","Czechia","Denmark","Djibouti","Dominica","Dominican Republic","Ecuador","Egypt","El Salvador","Equatorial Guinea","Eritrea","Estonia","Eswatini","Ethiopia","Fiji","Finland","France","Gabon","Gambia","Georgia","Germany","Ghana","Greece","Grenada","Guatemala","Guinea","Guinea-Bissau","Guyana","Haiti","Honduras","Hungary","Iceland","India","Indonesia","Iran","Iraq","Ireland","Israel","Italy","Jamaica","Japan","Jordan","Kazakhstan","Kenya","Kiribati","Korea (North)","Korea (South)","Kuwait","Kyrgyzstan","Laos","Latvia","Lebanon","Lesotho","Liberia","Libya","Liechtenstein","Lithuania","Luxembourg","Madagascar","Malawi","Malaysia","Maldives","Mali","Malta","Marshall Islands","Mauritania","Mauritius","Mexico","Micronesia","Moldova","Monaco","Mongolia","Montenegro","Morocco","Mozambique","Myanmar","Namibia","Nauru","Nepal","Netherlands","New Zealand","Nicaragua","Niger","Nigeria","North Macedonia","Norway","Oman","Pakistan","Palau","Palestine","Panama","Papua New Guinea","Paraguay","Peru","Philippines","Poland","Portugal","Qatar","Romania","Russia","Rwanda","Saint Kitts and Nevis","Saint Lucia","Saint Vincent","Samoa","San Marino","Sao Tome and Principe","Saudi Arabia","Senegal","Serbia","Seychelles","Sierra Leone","Singapore","Slovakia","Slovenia","Solomon Islands","Somalia","South Africa","South Sudan","Spain","Sri Lanka","Sudan","Suriname","Sweden","Switzerland","Syria","Taiwan","Tajikistan","Tanzania","Thailand","Timor-Leste","Togo","Tonga","Trinidad and Tobago","Tunisia","Turkey","Turkmenistan","Tuvalu","Uganda","Ukraine","United Arab Emirates","United Kingdom","United States","Uruguay","Uzbekistan","Vanuatu","Vatican City","Venezuela","Vietnam","Yemen","Zambia","Zimbabwe"];

    const countrySelect = document.getElementById('country');
    allCountries.forEach(c => countrySelect.add(new Option(c, c)));
    countrySelect.onchange = function() {
        const sDiv = document.getElementById('stateDiv'), cDiv = document.getElementById('cityDiv');
        if (locationData[this.value]) {
            sDiv.innerHTML = '<select id="state" name="State" class="form-select" required><option value="" selected disabled>Select State</option></select>';
            cDiv.innerHTML = '<select id="city" name="City" class="form-select" required disabled><option value="" selected disabled>Select City</option></select>';
            const sSel = document.getElementById('state'), cSel = document.getElementById('city');
            for (let s in locationData[this.value]) sSel.add(new Option(s, s));
            sSel.onchange = function() { cSel.innerHTML = '<option value="" selected disabled>Select City</option>'; cSel.disabled = false; locationData[countrySelect.value][this.value].forEach(city => cSel.add(new Option(city, city))); };
        } else { sDiv.innerHTML = '<input type="text" name="State" class="form-control" placeholder="State" required>'; cDiv.innerHTML = '<input type="text" name="City" class="form-control" placeholder="City" required>'; }
    };

    let currentTargetInput, currentTargetHidden;
    const inlineFp = flatpickr("#inlineCalendar", { inline: true, dateFormat: "Y-m-d" });
    function openDateModal(tid, hid, title) { 
        currentTargetInput = document.getElementById(tid); 
        currentTargetHidden = document.getElementById(hid); 
        document.getElementById('modalTitle').innerText = title; 
        document.getElementById('dateModalOverlay').classList.add('active'); 
    }
    function closeDateModal() { document.getElementById('dateModalOverlay').classList.remove('active'); }
    document.getElementById('dobTrigger').onclick = () => openDateModal('dobTrigger', 'dob', 'Date of Birth');
    document.getElementById('joiningDateTrigger').onclick = () => openDateModal('joiningDateTrigger', 'joiningDate', 'Joining Date');
    document.getElementById('confirmDateBtn').onclick = function() { 
        const sel = inlineFp.input.value; 
        if (sel) { 
            currentTargetHidden.value = sel; 
            currentTargetInput.value = new Date(sel).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }); 
            closeDateModal(); 
        } 
    };

    document.getElementById('investor').onchange = function() { document.getElementById('amountDiv').style.display = this.value === "Yes" ? "block" : "none"; };

    const scriptURL = 'https://script.google.com/macros/s/AKfycbxvdZikt9uBzuBE5sCsUjStmD1ic2NXeaCdhrXf0nIR5k0mt5uT-5Pgw9ELhnYhrlgr/exec'; 
    let isEmailVerified = false;

    document.getElementById('sendCodeBtn').onclick = function() {
        const email = document.getElementById('email'); if (!email.value) return;
        this.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
        let fd = new FormData(); fd.append("action", "sendOTP"); fd.append("Email", email.value);
        fetch(scriptURL, { method: 'POST', body: fd }).then(res => res.json()).then(data => { if(data.result === "success") { document.getElementById('modalEmailText').innerText = email.value; document.getElementById('otpModalOverlay').classList.add('active'); this.textContent = 'Sent'; } });
    };

    document.getElementById('verifyCodeBtn').onclick = function() {
        const code = document.getElementById('verificationCode').value;
        let fd = new FormData(); fd.append("action", "verifyOTP"); fd.append("Email", document.getElementById('email').value); fd.append("otp", code);
        fetch(scriptURL, { method: 'POST', body: fd }).then(res => res.json()).then(data => { if(data.result === "success") { isEmailVerified = true; document.getElementById('otpModalOverlay').classList.remove('active'); document.getElementById('sendCodeBtn').innerHTML = '✓ Verified'; document.getElementById('sendCodeBtn').className = "btn btn-success-custom w-100"; } });
    };

    document.getElementById('form').onsubmit = function(e) {
        e.preventDefault(); if(!isEmailVerified) { alert("Verify email!"); return; }
        const sBtn = document.getElementById('submitBtn'); sBtn.innerHTML = 'Submitting...';
        let fd = new FormData(this); fd.append("action", "submitForm");
        fetch(scriptURL, { method: 'POST', body: fd }).then(res => res.json()).then(data => { if(data.result === "success") { document.getElementById('thankYouModalOverlay').classList.add('active'); } });
    };
  </script>
</body>
</html>

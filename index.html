<!DOCTYPE html>
<html>
<head>
  <title>LEVZA Employee Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <style>
    body { background-image: linear-gradient(135deg, rgba(11, 31, 58, 0.7), rgba(20, 47, 85, 0.7)), url('https://i.postimg.cc/4yfdVF95/Chat-GPT-Image-Apr-5-2026-04-46-20-PM.png'); background-size: cover; background-position: center; background-attachment: fixed; font-family: 'Segoe UI', sans-serif; color: #fff; min-height: 100vh; position: relative; }
    .logo-container { position: absolute; top: 25px; left: 30px; }
    .logo { width: 250px; }
    .page-container { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; min-height: 100vh; padding: 100px 20px 40px 20px; }
    .form-header-text { text-align: center; margin-bottom: 25px; width: 100%; }
    .form-title { font-weight: 600; color: #ffffff; font-size: 2.2rem; }
    .form-title span { color: #ff9900; }
    .form-subtitle { font-size: 0.95rem; color: #ccc; }
    
    .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 18px; padding: 2.5rem; border: 1px solid rgba(255, 255, 255, 0.15); border-top: 1px solid rgba(255, 255, 255, 0.3); border-left: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4); max-width: 900px; width: 100%; }
    .section-title { font-weight: 600; margin-top: 1.5rem; margin-bottom: 1.5rem; color: #fff; display: flex; align-items: center; gap: 10px; }
    .section-title i { color: #ff9900; }
    
    .form-control, .form-select { background-color: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; border-radius: 10px; height: 48px; padding-left: 15px; transition: all 0.3s; }
    .form-control::placeholder { color: #bbb; opacity: 1; }
    .form-control:focus, .form-select:focus { background-color: rgba(255, 255, 255, 0.15); border-color: #ff9900; box-shadow: 0 0 10px rgba(255, 153, 0, 0.4); color: #fff; }
    
    /* Chrome Auto-fill White Background Fix */
    input:-webkit-autofill, input:-webkit-autofill:hover, input:-webkit-autofill:focus { -webkit-text-fill-color: #fff !important; -webkit-box-shadow: 0 0 0px 1000px #0e2746 inset !important; transition: background-color 5000s ease-in-out 0s; }
    .form-control:disabled, .form-control[readonly] { background-color: rgba(255, 255, 255, 0.03) !important; color: #999 !important; border-color: rgba(255, 255, 255, 0.1) !important; cursor: not-allowed; }

    .btn-submit { background: linear-gradient(135deg, #ff9900, #ff7a00); border: none; border-radius: 12px; height: 52px; font-weight: 600; color: #fff; transition: all 0.3s; font-size: 1.1rem; margin-top: 2rem; }
    .btn-submit:hover { box-shadow: 0 5px 15px rgba(255, 153, 0, 0.5); transform: translateY(-2px); }
    .btn-code { height: 48px; border-radius: 10px; background-color: rgba(255, 255, 255, 0.1); color: #fff; border: 1px solid rgba(255, 255, 255, 0.2); transition: all 0.3s;}
    .btn-code:hover { background-color: rgba(255, 153, 0, 0.2); border-color: #ff9900; }
    .btn-success-custom { background-color: #198754 !important; color: white !important; border: none !important; pointer-events: none; }
    
    /* ========================================= */
    /* ULTRA-PREMIUM CALENDAR (FLATPICKR)        */
    /* ========================================= */
    .flatpickr-calendar { background: rgba(11, 31, 58, 0.95) !important; backdrop-filter: blur(15px) !important; border: 1px solid rgba(255, 153, 0, 0.4) !important; border-radius: 15px !important; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5) !important; animation: slideUpCal 0.4s ease-out; }
    @keyframes slideUpCal { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .flatpickr-day { color: #fff !important; border-radius: 8px !important; }
    .flatpickr-day:hover { background: rgba(255, 153, 0, 0.2) !important; border-color: #ff9900 !important; color: #ff9900 !important; }
    .flatpickr-day.selected { background: linear-gradient(135deg, #ff9900, #ff7a00) !important; border: none !important; }
    .flatpickr-weekday { color: #ff9900 !important; font-weight: bold !important; }
    .flatpickr-current-month .flatpickr-monthDropdown-months { background: #0b1f3a !important; color: #fff !important; }

    /* ========================================= */
    /* VIP OTP MODAL DESIGN                      */
    /* ========================================= */
    .otp-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(4, 15, 33, 0.85); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 10000; opacity: 0; visibility: hidden; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .otp-modal-overlay.active { opacity: 1; visibility: visible; }
    .otp-modal-card { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px; padding: 2.5rem; width: 90%; max-width: 420px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5); transform: translateY(30px) scale(0.9); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .otp-modal-overlay.active .otp-modal-card { transform: translateY(0) scale(1); }
    .otp-icon-wrap { width: 70px; height: 70px; background: rgba(255,153,0,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem auto; border: 1px solid rgba(255,153,0,0.5); color: #ff9900; font-size: 2rem; }
    .otp-input-large { background: rgba(0, 0, 0, 0.3) !important; font-size: 1.8rem !important; letter-spacing: 12px; text-align: center; border: 2px solid rgba(255,153,0,0.5) !important; color: #fff !important; height: 65px; border-radius: 12px; font-weight: bold; margin-bottom: 1rem; }
    .btn-verify-modal { background: linear-gradient(135deg, #ff9900, #ff7a00); color: white; border: none; border-radius: 10px; height: 50px; font-weight: 600; width: 100%; font-size: 1.1rem; }
    .btn-close-modal { background: transparent; color: #aaa; border: none; margin-top: 1rem; text-decoration: underline; font-size: 0.9rem; }

    #successBox { position: fixed; top: 20px; right: 20px; background: rgba(11, 31, 58, 0.9); backdrop-filter: blur(10px); color: white; padding: 15px 25px; border-radius: 10px; opacity: 0; transition: opacity 0.4s; z-index: 9999; border: 1px solid #ff9900; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    #successBox.show { opacity: 1; }
  </style>
</head>
<body>

  <div class="logo-container">
      <img src="https://i.postimg.cc/MKh5pB49/Gemini-Generated-Image-f1z1rjf1z1rjf1z1-removebg-preview.png" class="logo" alt="LEVZA Logo">
  </div>

  <div class="page-container">
    <div class="form-header-text">
        <h2 class="form-title">Employee <span>Application Form</span></h2>
        <p class="form-subtitle">We're excited to learn more about you. Please fill in your details below.</p>
    </div>

    <div class="card">
      <form id="form">
        <h5 class="section-title" style="margin-top: 0;"><i class="fas fa-user"></i>Personal Information</h5>
        <div class="row g-3 align-items-center">
          <div class="col-md-6"><input type="text" name="FirstName" class="form-control" placeholder="First Name" required></div>
          <div class="col-md-6"><input type="text" name="LastName" class="form-control" placeholder="Last Name" required></div>
          <div class="col-md-4"><input type="text" name="CNIC" class="form-control" placeholder="CNIC Number (xxxxx-xxxxxxx-x)" required></div>
          <div class="col-md-4"><input type="text" id="dob" name="DOB" class="form-control" placeholder="Date of Birth" required></div>
          <div class="col-md-4">
              <select name="Gender" class="form-select" required>
                  <option value="" selected disabled>Select Gender</option>
                  <option>Male</option>
                  <option>Female</option>
                  <option>Other</option>
              </select>
          </div>
          <div class="col-md-5"><input type="tel" name="Contact" class="form-control" placeholder="Contact Number (03xx-xxxxxxx)" required></div>
          <div class="col-md-5"><input type="email" id="email" name="Email" class="form-control" placeholder="Email Address" required></div>
          <div class="col-md-2"><button type="button" id="sendCodeBtn" class="btn btn-code w-100">Send OTP</button></div>
        </div>

        <h5 class="section-title"><i class="fas fa-map-marker-alt"></i>Address</h5>
        <div class="row g-3">
           <div class="col-md-12">
               <select id="country" name="Country" class="form-select" required>
                   <option value="" selected disabled>Select Country</option>
               </select>
           </div>
          <div class="col-md-4" id="stateDiv">
              <select id="state" name="State" class="form-select" required disabled><option value="" selected disabled>Select State</option></select>
          </div>
          <div class="col-md-4" id="cityDiv">
              <select id="city" name="City" class="form-select" required disabled><option value="" selected disabled>Select City</option></select>
          </div>
          <div class="col-md-4"><input type="text" name="Postal" class="form-control" placeholder="Postal Code" required></div>
          <div class="col-md-12"><input type="text" name="Address" class="form-control" placeholder="Street Address" required></div>
        </div>

        <h5 class="section-title"><i class="fas fa-briefcase"></i>Employee Details</h5>
        <div class="row g-3">
            <div class="col-md-6">
                <select name="Position" class="form-select" required>
                    <option value="" selected disabled>Position Applied For</option>
                    <option>Account Provider PK</option>
                    <option>Account Provider UK</option>
                    <option>Manager</option>
                    <option>Developer</option>
                </select>
            </div>
            <div class="col-md-6">
                <select id="investor" name="Investor" class="form-select" required>
                    <option value="" selected disabled>Are you an investor?</option>
                    <option>No</option>
                    <option>Yes</option>
                </select>
            </div>
            <div class="col-md-6"><input type="text" id="joiningDate" name="JoiningDate" class="form-control" placeholder="Available joining date" required></div>
            <div class="col-md-6" id="amountDiv" style="display:none"><input type="number" id="amount" name="InvestmentAmount" class="form-control" placeholder="Investment Amount"></div>
            <div class="col-md-12"><textarea name="GreatFit" class="form-control" rows="3" placeholder="Tell us why you're a great fit..." required></textarea></div>
        </div>
        
        <div class="form-check mt-4">
          <input class="form-check-input" type="checkbox" id="declaration" required>
          <label class="form-check-label" for="declaration">I have filled all sections and verified my email.</label>
        </div>
        
        <button id="submitBtn" class="btn-submit w-100" type="submit"><i class="fas fa-paper-plane"></i> Submit Application</button>
      </form>
    </div>
  </div>

  <div id="otpModalOverlay" class="otp-modal-overlay">
      <div class="otp-modal-card">
          <div class="otp-icon-wrap"><i class="fas fa-envelope-open-text"></i></div>
          <h4 style="color: #fff;">Verify Email</h4>
          <p style="color: #bbb; font-size: 0.9rem;">Sent to: <span id="modalEmailText" style="color:#ff9900;"></span></p>
          <input type="text" id="verificationCode" class="form-control otp-input-large" placeholder="------" maxlength="6">
          <small id="otpMessage" class="d-block text-warning mb-2"></small>
          <button type="button" id="verifyCodeBtn" class="btn btn-verify-modal">Verify Now</button>
          <button type="button" id="closeModalBtn" class="btn btn-close-modal">Cancel</button>
      </div>
  </div>

  <div id="successBox">Form submitted successfully ✅</div>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script>
    // --- LOCATION DATA ---
    const locationData = {
        "Pakistan": { "Punjab": ["Lahore", "Faisalabad", "Rawalpindi"], "Sindh": ["Karachi", "Hyderabad"], "KPK": ["Peshawar"], "Balochistan": ["Quetta"], "Islamabad": ["Islamabad City"] },
        "United Kingdom": { "England": ["London", "Manchester"], "Scotland": ["Edinburgh"], "Wales": ["Cardiff"] }
    };
    const allCountries = ["Pakistan", "United Kingdom", "United States", "Canada", "Australia", "UAE"];

    const countrySelect = document.getElementById('country');
    allCountries.forEach(c => { let opt = new Option(c, c); countrySelect.add(opt); });

    countrySelect.onchange = function() {
        const sDiv = document.getElementById('stateDiv'), cDiv = document.getElementById('cityDiv');
        if (locationData[this.value]) {
            sDiv.innerHTML = '<select id="state" name="State" class="form-select" required><option value="" selected disabled>Select State</option></select>';
            cDiv.innerHTML = '<select id="city" name="City" class="form-select" required disabled><option value="" selected disabled>Select City</option></select>';
            const sSel = document.getElementById('state'), cSel = document.getElementById('city');
            for (let s in locationData[this.value]) sSel.add(new Option(s, s));
            sSel.onchange = function() {
                cSel.innerHTML = '<option value="" selected disabled>Select City</option>'; cSel.disabled = false;
                locationData[countrySelect.value][this.value].forEach(city => cSel.add(new Option(city, city)));
            };
        } else {
            sDiv.innerHTML = '<input type="text" name="State" class="form-control" placeholder="State" required>';
            cDiv.innerHTML = '<input type="text" name="City" class="form-control" placeholder="City" required>';
        }
    };

    // --- PREMIUM CALENDAR ---
    const fpConfig = { altInput: true, altFormat: "F j, Y", dateFormat: "Y-m-d", disableMobile: true, animate: true };
    flatpickr("#dob, #joiningDate", fpConfig);

    const investorSelect = document.getElementById('investor'), amountDiv = document.getElementById('amountDiv');
    investorSelect.onchange = function() { amountDiv.style.display = this.value === "Yes" ? "block" : "none"; };

    // --- OTP & SUBMISSION ---
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwh_NS5k8IPHRs_oVtwW4DbfHPbWMx01ZnMi6OzanET5TxFUx4_PSbA05DlGL07bh5J/exec'; 
    let isEmailVerified = false;

    document.getElementById('sendCodeBtn').onclick = function() {
        const email = document.getElementById('email');
        if (!email.value || !email.checkValidity()) { alert("Enter valid email."); return; }
        this.innerHTML = '<i class="fas fa-spinner fa-spin"></i>'; this.disabled = true;

        let fd = new FormData(); fd.append("action", "sendOTP"); fd.append("Email", email.value);
        fetch(scriptURL, { method: 'POST', body: fd })
            .then(res => res.json()).then(data => {
                if(data.result === "success") {
                    document.getElementById('modalEmailText').innerText = email.value;
                    document.getElementById('otpModalOverlay').classList.add('active');
                    this.textContent = 'Sent'; this.disabled = false;
                }
            }).catch(() => { alert("Error!"); this.textContent = 'Send OTP'; this.disabled = false; });
    };

    document.getElementById('closeModalBtn').onclick = () => document.getElementById('otpModalOverlay').classList.remove('active');

    document.getElementById('verifyCodeBtn').onclick = function() {
        const code = document.getElementById('verificationCode').value;
        const msg = document.getElementById('otpMessage');
        if (code.length < 6) return;
        this.disabled = true;

        let fd = new FormData(); fd.append("action", "verifyOTP"); fd.append("Email", document.getElementById('email').value); fd.append("otp", code);
        fetch(scriptURL, { method: 'POST', body: fd })
            .then(res => res.json()).then(data => {
                if(data.result === "success") {
                    isEmailVerified = true;
                    document.getElementById('otpModalOverlay').classList.remove('active');
                    const btn = document.getElementById('sendCodeBtn');
                    btn.innerHTML = '<i class="fas fa-check-circle"></i> Verified';
                    btn.className = "btn btn-success-custom w-100";
                    document.getElementById('email').readOnly = true;
                } else { msg.innerText = "Invalid OTP!"; this.disabled = false; }
            });
    };

    document.getElementById('form').onsubmit = function(e) {
        e.preventDefault();
        if(!isEmailVerified) { alert("Verify email first!"); return; }
        const sBtn = document.getElementById('submitBtn');
        sBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting...'; sBtn.disabled = true;

        let fd = new FormData(this); fd.append("action", "submitForm");
        fetch(scriptURL, { method: 'POST', body: fd })
            .then(res => res.json()).then(data => {
                if(data.result === "success") {
                    document.getElementById('successBox').classList.add('show');
                    setTimeout(() => location.reload(), 3000);
                }
            });
    };
  </script>
</body>
</html>

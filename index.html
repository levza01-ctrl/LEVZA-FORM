<!DOCTYPE html>
<html>
<head>
  <title>LEVZA Employee Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <style>
    body { background-image: linear-gradient(135deg, rgba(11, 31, 58, 0.7), rgba(20, 47, 85, 0.7)), url('https://i.postimg.cc/4yfdVF95/Chat-GPT-Image-Apr-5-2026-04-46-20-PM.png'); background-size: cover; background-position: center; background-attachment: fixed; font-family: 'Segoe UI', sans-serif; color: #fff; min-height: 100vh; position: relative; overflow-x: hidden; }
    .logo-container { position: absolute; top: 25px; left: 30px; }
    .logo { width: 250px; }
    .page-container { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; min-height: 100vh; padding: 100px 20px 40px 20px; }
    .form-title { font-weight: 600; color: #ffffff; font-size: 2.2rem; text-align: center; }
    .form-title span { color: #ff9900; }
    .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 18px; padding: 2.5rem; border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4); max-width: 900px; width: 100%; }
    .section-title { font-weight: 600; margin-top: 1.5rem; margin-bottom: 1.5rem; color: #fff; display: flex; align-items: center; gap: 10px; }
    .section-title i { color: #ff9900; }

    /* ====================================================== */
    /* THE FINAL PASTE & COLOR LOCK FIX (NO WHITE FLASH)      */
    /* ====================================================== */
    .form-control, .form-select { 
        background-color: rgba(255, 255, 255, 0.08) !important; 
        border: 1px solid rgba(255, 255, 255, 0.2) !important; 
        color: #ffffff !important; 
        border-radius: 10px; 
        height: 48px; 
    }

    /* Is se Notepad paste aur Autofill ka white color hamesha ke liye block ho jayega */
    input:-webkit-autofill,
    input:-webkit-autofill:hover, 
    input:-webkit-autofill:focus, 
    select:-webkit-autofill {
        -webkit-box-shadow: 0 0 0 1000px #132a4a inset !important; 
        -webkit-text-fill-color: white !important;
        transition: background-color 5000s ease-in-out 0s !important;
    }

    .form-control:focus, .form-select:focus { 
        background-color: rgba(255, 255, 255, 0.15) !important; 
        border-color: #ff9900 !important; 
        box-shadow: 0 0 15px rgba(255, 153, 0, 0.2) !important;
        color: #fff !important;
    }

    /* ========================================= */
    /* PREMIUM IPHONE-STYLE CALENDAR UI          */
    /* ========================================= */
    .flatpickr-calendar { background: #0b1f3a !important; border: 1px solid rgba(255, 153, 0, 0.4) !important; border-radius: 20px !important; box-shadow: 0 20px 40px rgba(0,0,0,0.6) !important; padding: 10px !important; }
    
    /* Header (Month/Year) customization */
    .flatpickr-month { height: 45px !important; margin-bottom: 10px !important; }
    .flatpickr-current-month { font-size: 1.2rem !important; color: #fff !important; font-weight: 600 !important; }
    
    /* Month aur Year ko glassy segments banana */
    .flatpickr-monthDropdown-months, .numInputWrapper {
        background: rgba(255, 255, 255, 0.1) !important;
        border-radius: 8px !important;
        padding: 4px 8px !important;
        margin: 0 5px !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        color: #fff !important;
        cursor: pointer !important;
    }

    .flatpickr-monthDropdown-months:hover, .numInputWrapper:hover { background: rgba(255, 153, 0, 0.2) !important; }
    
    .flatpickr-weekday { color: #ff9900 !important; font-weight: bold !important; }
    .flatpickr-day { color: #fff !important; border-radius: 10px !important; }
    .flatpickr-day.selected { background: #ff9900 !important; border-color: #ff9900 !important; }
    .flatpickr-day:hover { background: rgba(255, 153, 0, 0.3) !important; }

    /* Modals Control */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(4, 15, 33, 0.9); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 10001; padding: 20px; }
    .modal-overlay.active { display: flex; }
    .modal-card { background: #0b1f3a; border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 24px; padding: 1.5rem; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }

    .btn-submit { background: linear-gradient(135deg, #ff9900, #ff7a00); border: none; border-radius: 12px; height: 50px; font-weight: 600; color: #fff; transition: 0.3s; width: 100%; }
    .btn-code { height: 48px; border-radius: 10px; background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
    .btn-success-custom { background-color: #198754 !important; pointer-events: none; }
  </style>
</head>
<body>

  <div class="logo-container">
      <img src="https://i.postimg.cc/MKh5pB49/Gemini-Generated-Image-f1z1rjf1z1rjf1z1-removebg-preview.png" class="logo" alt="LEVZA Logo">
  </div>

  <div class="page-container">
    <h2 class="form-title">Employee <span>Application</span></h2>
    <div class="card mt-4">
      <form id="form">
        <h5 class="section-title" style="margin-top:0;"><i class="fas fa-user"></i>Personal Info</h5>
        <div class="row g-3">
          <div class="col-md-6"><input type="text" name="FirstName" class="form-control" placeholder="First Name" required></div>
          <div class="col-md-6"><input type="text" name="LastName" class="form-control" placeholder="Last Name" required></div>
          <div class="col-md-4"><input type="text" name="CNIC" class="form-control" placeholder="CNIC Number" required></div>
          <div class="col-md-4">
              <input type="text" id="dobTrigger" class="form-control" placeholder="Date of Birth" readonly required style="cursor:pointer;">
              <input type="hidden" id="dob" name="DOB">
          </div>
          <div class="col-md-4">
              <select name="Gender" class="form-select" required>
                  <option value="" selected disabled>Gender</option>
                  <option>Male</option><option>Female</option><option>Other</option>
              </select>
          </div>
          <div class="col-md-5"><input type="tel" name="Contact" class="form-control" placeholder="Contact" required></div>
          <div class="col-md-5"><input type="email" id="email" name="Email" class="form-control" placeholder="Email" required></div>
          <div class="col-md-2"><button type="button" id="sendCodeBtn" class="btn btn-code w-100">OTP</button></div>
        </div>

        <h5 class="section-title"><i class="fas fa-map-marker-alt"></i>Address</h5>
        <div class="row g-3">
           <div class="col-md-12">
               <select id="country" name="Country" class="form-select" required><option value="" selected disabled>Select Country</option></select>
           </div>
          <div class="col-md-4" id="stateDiv"><select id="state" name="State" class="form-select" required disabled><option value="" selected disabled>State</option></select></div>
          <div class="col-md-4" id="cityDiv"><select id="city" name="City" class="form-select" required disabled><option value="" selected disabled>City</option></select></div>
          <div class="col-md-4"><input type="text" name="Postal" class="form-control" placeholder="Postal Code" required></div>
          <div class="col-md-12"><input type="text" name="Address" class="form-control" placeholder="Street Address" required></div>
        </div>

        <h5 class="section-title"><i class="fas fa-briefcase"></i>Work Details</h5>
        <div class="row g-3">
            <div class="col-md-6">
                <select name="Position" class="form-select" required>
                    <option value="" selected disabled>Position</option>
                    <option>Account Provider PK</option><option>Account Provider UK</option><option>Manager</option><option>Developer</option>
                </select>
            </div>
            <div class="col-md-6">
                <select id="investor" name="Investor" class="form-select" required>
                    <option value="" selected disabled>Are you an investor?</option>
                    <option>No</option><option>Yes</option>
                </select>
            </div>
            <div class="col-md-6">
                <input type="text" id="joiningDateTrigger" class="form-control" placeholder="Joining Date" readonly required style="cursor:pointer;">
                <input type="hidden" id="joiningDate" name="JoiningDate">
            </div>
            <div class="col-md-6" id="amountDiv" style="display:none"><input type="number" id="amount" name="InvestmentAmount" class="form-control" placeholder="Amount"></div>
            <div class="col-md-12"><textarea name="GreatFit" class="form-control" rows="3" placeholder="Tell us why you're a great fit..." required></textarea></div>
        </div>
        
        <div class="form-check mt-4">
          <input class="form-check-input me-2" type="checkbox" id="declaration" required>
          <label class="form-check-label" for="declaration" style="color:#fff;">I verify my details.</label>
        </div>
        
        <button id="submitBtn" class="btn-submit mt-3" type="submit"><i class="fas fa-paper-plane"></i> Submit Application</button>
      </form>
    </div>
  </div>

  <div id="dateModalOverlay" class="modal-overlay">
      <div class="modal-card">
          <h5 id="modalTitle" style="color: #ff9900; margin-bottom: 15px;">Select Date</h5>
          <div id="inlineCalendar"></div>
          <button type="button" id="confirmDateBtn" class="btn-submit mt-3">Confirm Selection</button>
          <button type="button" onclick="closeDateModal()" style="background:none; border:none; color:#aaa; margin-top:10px; text-decoration:underline;">Cancel</button>
      </div>
  </div>

  <div id="otpModalOverlay" class="modal-overlay">
      <div class="modal-card">
          <h4 style="color:#fff;">Verify Email</h4>
          <p id="modalEmailText" style="color:#ff9900;"></p>
          <input type="text" id="verificationCode" class="form-control text-center" placeholder="------" maxlength="6" style="font-size:1.5rem; letter-spacing:10px;">
          <button type="button" id="verifyCodeBtn" class="btn-submit mt-3">Verify Now</button>
      </div>
  </div>

  <div id="thankYouModalOverlay" class="modal-overlay">
      <div class="modal-card">
          <div style="font-size:4rem; color:#198754;">✓</div>
          <h3 style="color:#fff;">Success!</h3>
          <p style="color:#ccc;">Your application has been submitted.</p>
          <button type="button" onclick="location.reload()" class="btn-submit mt-3">Close</button>
      </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script>
    const locationData = { "Pakistan": { "Punjab": ["Lahore", "Faisalabad"], "Sindh": ["Karachi", "Hyderabad"] }, "United Kingdom": { "England": ["London", "Manchester"] } };
    const allCountries = ["Pakistan", "United Kingdom", "United States", "Canada", "Australia", "UAE"];

    const countrySelect = document.getElementById('country');
    allCountries.forEach(c => countrySelect.add(new Option(c, c)));
    countrySelect.onchange = function() {
        const sDiv = document.getElementById('stateDiv'), cDiv = document.getElementById('cityDiv');
        if (locationData[this.value]) {
            sDiv.innerHTML = '<select id="state" name="State" class="form-select" required><option value="" selected disabled>State</option></select>';
            cDiv.innerHTML = '<select id="city" name="City" class="form-select" required disabled><option value="" selected disabled>City</option></select>';
            const sSel = document.getElementById('state'), cSel = document.getElementById('city');
            for (let s in locationData[this.value]) sSel.add(new Option(s, s));
            sSel.onchange = function() { cSel.innerHTML = '<option value="" selected disabled>City</option>'; cSel.disabled = false; locationData[countrySelect.value][this.value].forEach(city => cSel.add(new Option(city, city))); };
        } else { sDiv.innerHTML = '<input type="text" name="State" class="form-control" placeholder="State" required>'; cDiv.innerHTML = '<input type="text" name="City" class="form-control" placeholder="City" required>'; }
    };

    let currentInput, currentHidden;
    const inlineFp = flatpickr("#inlineCalendar", { 
        inline: true, 
        dateFormat: "Y-m-d",
        monthSelectorType: "dropdown",
        yearSelectorType: "static",
        prevArrow: "<i class='fas fa-chevron-left'></i>",
        nextArrow: "<i class='fas fa-chevron-right'></i>"
    });
    
    function openDateModal(tid, hid, title) { currentInput = document.getElementById(tid); currentHidden = document.getElementById(hid); document.getElementById('modalTitle').innerText = title; document.getElementById('dateModalOverlay').classList.add('active'); }
    function closeDateModal() { document.getElementById('dateModalOverlay').classList.remove('active'); }
    document.getElementById('dobTrigger').onclick = () => openDateModal('dobTrigger', 'dob', 'Date of Birth');
    document.getElementById('joiningDateTrigger').onclick = () => openDateModal('joiningDateTrigger', 'joiningDate', 'Joining Date');
    document.getElementById('confirmDateBtn').onclick = function() { const sel = inlineFp.input.value; if(sel) { currentHidden.value = sel; currentInput.value = new Date(sel).toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'}); closeDateModal(); } };

    document.getElementById('investor').onchange = function() { document.getElementById('amountDiv').style.display = this.value === "Yes" ? "block" : "none"; };

    const scriptURL = 'https://script.google.com/macros/s/AKfycbxvdZikt9uBzuBE5sCsUjStmD1ic2NXeaCdhrXf0nIR5k0mt5uT-5Pgw9ELhnYhrlgr/exec'; 
    let isEmailVerified = false;

    document.getElementById('sendCodeBtn').onclick = function() {
        const email = document.getElementById('email'); if (!email.value) return;
        this.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
        fetch(scriptURL, { method: 'POST', body: new FormData(document.getElementById('form')) }).then(() => { document.getElementById('modalEmailText').innerText = email.value; document.getElementById('otpModalOverlay').classList.add('active'); this.textContent = 'Sent'; });
    };

    document.getElementById('verifyCodeBtn').onclick = function() {
        isEmailVerified = true; document.getElementById('otpModalOverlay').classList.remove('active'); 
        document.getElementById('sendCodeBtn').innerHTML = '✓ Verified'; document.getElementById('sendCodeBtn').className = "btn btn-success-custom w-100";
    };

    document.getElementById('form').onsubmit = function(e) {
        e.preventDefault(); if(!isEmailVerified) { alert("Verify email!"); return; }
        document.getElementById('submitBtn').innerHTML = 'Submitting...';
        fetch(scriptURL, { method: 'POST', body: new FormData(this) }).then(() => { document.getElementById('thankYouModalOverlay').classList.add('active'); });
    };
  </script>
</body>
</html>

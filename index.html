<!DOCTYPE html>
<html>
<head>
  <title>LEVZA Employee Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <style>
    body { background-image: linear-gradient(135deg, rgba(11, 31, 58, 0.75), rgba(20, 47, 85, 0.75)), url('https://i.postimg.cc/4yfdVF95/Chat-GPT-Image-Apr-5-2026-04-46-20-PM.png'); background-size: cover; background-position: center; background-attachment: fixed; font-family: 'Segoe UI', sans-serif; color: #fff; min-height: 100vh; overflow-x: hidden; }
    .logo-container { position: absolute; top: 25px; left: 30px; }
    .logo { width: 250px; }
    .page-container { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; min-height: 100vh; padding: 100px 20px 40px 20px; }
    .form-header-text { text-align: center; margin-bottom: 25px; }
    .form-title { font-weight: 600; color: #ffffff; font-size: 2.2rem; }
    .form-title span { color: #ff9900; }
    .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border-radius: 18px; padding: 2.5rem; border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4); max-width: 900px; width: 100%; }
    .section-title { font-weight: 600; margin: 1.5rem 0; color: #fff; display: flex; align-items: center; gap: 10px; }
    .section-title i { color: #ff9900; }
    .form-control, .form-select { background-color: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; border-radius: 10px; height: 48px; }
    .form-control:focus, .form-select:focus { background-color: rgba(255, 255, 255, 0.15); border-color: #ff9900; color: #fff; box-shadow: none; }
    .form-select option { background: #0b1f3a; color: #fff; }
    .form-control:disabled, .form-control[readonly] { background-color: rgba(255, 255, 255, 0.05) !important; color: #fff !important; cursor: pointer !important; }
    .btn-submit { background: linear-gradient(135deg, #ff9900, #ff7a00); border: none; border-radius: 12px; height: 55px; font-weight: 600; color: #fff; margin-top: 2rem; transition: 0.3s; }
    .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(255, 153, 0, 0.4); }
    .btn-code { height: 48px; border-radius: 10px; background: rgba(255, 255, 255, 0.1); color: #fff; border: 1px solid rgba(255, 255, 255, 0.2); }
    .btn-success-custom { background-color: #198754 !important; border: none; pointer-events: none; }
    .form-check-label { color: #fff !important; cursor: pointer; }

    /* THANK YOU MODAL */
    .thank-you-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(4, 15, 33, 0.9); backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: center; z-index: 11000; opacity: 0; visibility: hidden; transition: 0.5s; }
    .thank-you-overlay.active { opacity: 1; visibility: visible; }
    .thank-you-card { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 25px; padding: 3.5rem 2rem; width: 90%; max-width: 500px; text-align: center; transform: scale(0.8); transition: 0.5s; }
    .thank-you-overlay.active .thank-you-card { transform: scale(1); }
    .success-icon { width: 80px; height: 80px; background: #198754; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin: 0 auto 1.5rem; box-shadow: 0 0 20px rgba(25, 135, 84, 0.5); }
    
    /* OTP MODAL */
    .otp-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(4, 15, 33, 0.85); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 10000; opacity: 0; visibility: hidden; transition: 0.4s; }
    .otp-modal-overlay.active { opacity: 1; visibility: visible; }
    .otp-modal-card { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px; padding: 2.5rem; width: 90%; max-width: 420px; text-align: center; }
    .otp-input-large { background: rgba(0, 0, 0, 0.3) !important; font-size: 1.8rem !important; letter-spacing: 12px; text-align: center; border: 2px solid #ff9900 !important; color: #fff !important; height: 65px; margin-bottom: 1rem; }

    /* CALENDAR */
    .flatpickr-calendar { background: rgba(11, 31, 58, 0.98) !important; border: 1px solid #ff9900 !important; color: #fff !important; }
    .flatpickr-day, .flatpickr-current-month, .cur-year { color: #fff !important; }
    .flatpickr-weekday { color: #ff9900 !important; }
    .flatpickr-day.selected { background: #ff9900 !important; }
  </style>
</head>
<body>

  <div class="logo-container"><img src="https://i.postimg.cc/MKh5pB49/Gemini-Generated-Image-f1z1rjf1z1rjf1z1-removebg-preview.png" class="logo"></div>

  <div class="page-container">
    <div class="form-header-text">
        <h2 class="form-title">Employee <span>Application Form</span></h2>
        <p style="color: #ccc;">Join the LEVZA team and build your future with us.</p>
    </div>

    <div class="card">
      <form id="form">
        <h5 class="section-title" style="margin-top: 0;"><i class="fas fa-user"></i>Personal Information</h5>
        <div class="row g-3">
          <div class="col-md-6"><input type="text" name="FirstName" class="form-control" placeholder="First Name" required></div>
          <div class="col-md-6"><input type="text" name="LastName" class="form-control" placeholder="Last Name" required></div>
          <div class="col-md-4"><input type="text" name="CNIC" class="form-control" placeholder="CNIC (xxxxx-xxxxxxx-x)" required></div>
          <div class="col-md-4"><input type="text" id="dob" name="DOB" class="form-control" placeholder="Date of Birth" required></div>
          <div class="col-md-4"><select name="Gender" class="form-select" required><option value="" disabled selected>Gender</option><option>Male</option><option>Female</option></select></div>
          <div class="col-md-5"><input type="tel" name="Contact" class="form-control" placeholder="Contact (03xx-xxxxxxx)" required></div>
          <div class="col-md-5"><input type="email" id="email" name="Email" class="form-control" placeholder="Email Address" required></div>
          <div class="col-md-2"><button type="button" id="sendCodeBtn" class="btn btn-code w-100">Verify</button></div>
        </div>

        <h5 class="section-title"><i class="fas fa-map-marker-alt"></i>Address Details</h5>
        <div class="row g-3">
          <div class="col-md-12"><select id="country" name="Country" class="form-select" required><option value="" disabled selected>Select Country</option></select></div>
          <div class="col-md-4" id="stateDiv"><select id="state" name="State" class="form-select" required disabled><option disabled selected>State</option></select></div>
          <div class="col-md-4" id="cityDiv"><select id="city" name="City" class="form-select" required disabled><option disabled selected>City</option></select></div>
          <div class="col-md-4"><input type="text" name="Postal" class="form-control" placeholder="Postal Code" required></div>
          <div class="col-md-12"><input type="text" name="Address" class="form-control" placeholder="Complete Street Address" required></div>
        </div>

        <h5 class="section-title"><i class="fas fa-briefcase"></i>Employment</h5>
        <div class="row g-3">
          <div class="col-md-6"><select name="Position" class="form-select" required><option value="" disabled selected>Position</option><option>Account Provider PK</option><option>Account Provider UK</option><option>Manager</option><option>Developer</option></select></div>
          <div class="col-md-6"><select id="investor" name="Investor" class="form-select" required><option value="" disabled selected>Investor?</option><option>No</option><option>Yes</option></select></div>
          <div class="col-md-6"><input type="text" id="joiningDate" name="JoiningDate" class="form-control" placeholder="Joining Date" required></div>
          <div class="col-md-6" id="amountDiv" style="display:none"><input type="number" name="InvestmentAmount" class="form-control" placeholder="Amount"></div>
          <div class="col-md-12"><textarea name="GreatFit" class="form-control" rows="3" placeholder="Why are you a great fit for LEVZA?" required></textarea></div>
        </div>
        
        <div class="form-check mt-4"><input class="form-check-input" type="checkbox" id="declaration" required><label class="form-check-label" for="declaration">I confirm that all provided info is correct.</label></div>
        <button id="submitBtn" class="btn-submit w-100" type="submit">Submit Application</button>
      </form>
    </div>
  </div>

  <div id="otpModalOverlay" class="otp-modal-overlay">
      <div class="otp-modal-card">
          <i class="fas fa-shield-alt fa-3x text-warning mb-3"></i>
          <h4 class="text-white">Verify Email</h4>
          <p style="color: #bbb;">Enter the code sent to your email.</p>
          <input type="text" id="verificationCode" class="form-control otp-input-large" maxlength="6">
          <button type="button" id="verifyCodeBtn" class="btn-submit w-100" style="margin-top:0">Verify Now</button>
          <button type="button" id="closeModalBtn" style="background:none; border:none; color:#aaa; text-decoration:underline; margin-top:1rem;">Cancel</button>
      </div>
  </div>

  <div id="thankYouOverlay" class="thank-you-overlay">
      <div class="thank-you-card">
          <div class="success-icon"><i class="fas fa-check"></i></div>
          <h2 style="color: #fff; font-weight: 700;">Thank You!</h2>
          <p style="color: #ccc; font-size: 1.1rem; margin-bottom: 2rem;">Your application has been received successfully. <br> A confirmation email has been sent to you.</p>
          <button type="button" onclick="location.reload()" class="btn-submit px-5" style="margin:0; height:50px;">Return to Home</button>
      </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script>
    const locationData = { "Pakistan": { "Punjab": ["Lahore", "Faisalabad"], "Sindh": ["Karachi", "Hyderabad"] }, "United Kingdom": { "England": ["London", "Manchester"] } };
    const allCountries = ["Pakistan", "United Kingdom", "United States", "Canada", "UAE", "Australia"];
    const countrySelect = document.getElementById('country');
    allCountries.forEach(c => countrySelect.add(new Option(c, c)));

    countrySelect.onchange = function() {
        const sDiv = document.getElementById('stateDiv'), cDiv = document.getElementById('cityDiv');
        if (locationData[this.value]) {
            sDiv.innerHTML = '<select id="state" name="State" class="form-select" required><option disabled selected>State</option></select>';
            cDiv.innerHTML = '<select id="city" name="City" class="form-select" required disabled><option disabled selected>City</option></select>';
            const sSel = document.getElementById('state'), cSel = document.getElementById('city');
            for (let s in locationData[this.value]) sSel.add(new Option(s, s));
            sSel.onchange = function() { cSel.innerHTML = '<option disabled selected>City</option>'; cSel.disabled = false; locationData[countrySelect.value][this.value].forEach(city => cSel.add(new Option(city, city))); };
        } else {
            sDiv.innerHTML = '<input type="text" name="State" class="form-control" placeholder="State" required>';
            cDiv.innerHTML = '<input type="text" name="City" class="form-control" placeholder="City" required>';
        }
    };

    flatpickr("#dob, #joiningDate", { altInput: true, altFormat: "F j, Y", dateFormat: "Y-m-d", onReady: (s,d,i) => i.altInput.style.cursor="pointer" });
    document.getElementById('investor').onchange = function() { document.getElementById('amountDiv').style.display = this.value === "Yes" ? "block" : "none"; };

    // --- SUBMISSION SCRIPT ---
    const scriptURL = 'YAHAN_APNA_NAYA_URL_PASTE_KAREIN'; 
    let isEmailVerified = false;

    document.getElementById('sendCodeBtn').onclick = function() {
        const email = document.getElementById('email');
        if (!email.value || !email.checkValidity()) { alert("Enter valid email."); return; }
        this.innerHTML = '<i class="fas fa-spinner fa-spin"></i>'; this.disabled = true;
        let fd = new FormData(); fd.append("action", "sendOTP"); fd.append("Email", email.value);
        fetch(scriptURL, { method: 'POST', body: fd }).then(res => res.json()).then(data => {
            if(data.result === "success") { document.getElementById('otpModalOverlay').classList.add('active'); this.textContent = 'Sent'; this.disabled = false; }
        });
    };

    document.getElementById('closeModalBtn').onclick = () => document.getElementById('otpModalOverlay').classList.remove('active');

    document.getElementById('verifyCodeBtn').onclick = function() {
        const code = document.getElementById('verificationCode').value;
        if (code.length < 6) return; this.disabled = true;
        let fd = new FormData(); fd.append("action", "verifyOTP"); fd.append("Email", document.getElementById('email').value); fd.append("otp", code);
        fetch(scriptURL, { method: 'POST', body: fd }).then(res => res.json()).then(data => {
            if(data.result === "success") {
                isEmailVerified = true; document.getElementById('otpModalOverlay').classList.remove('active');
                const btn = document.getElementById('sendCodeBtn'); btn.innerHTML = '<i class="fas fa-check-circle"></i>';
                btn.className = "btn btn-success-custom w-100"; document.getElementById('email').readOnly = true;
            } else { alert("Invalid OTP"); this.disabled = false; }
        });
    };

    document.getElementById('form').onsubmit = function(e) {
        e.preventDefault();
        if(!isEmailVerified) { alert("Please verify email first."); return; }
        const sBtn = document.getElementById('submitBtn');
        sBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...'; sBtn.disabled = true;
        let fd = new FormData(this); fd.append("action", "submitForm");
        fetch(scriptURL, { method: 'POST', body: fd }).then(res => res.json()).then(data => {
            if(data.result === "success") {
                document.getElementById('thankYouOverlay').classList.add('active');
            }
        }).catch(() => { alert("Error!"); sBtn.innerHTML = 'Submit Application'; sBtn.disabled = false; });
    };
  </script>
</body>
</html>
